<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>404 // Logic Failure — HyBox</title>
    
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* DISCONNECTED FROM GLOBAL CSS - INTERNAL STYLES ONLY */
        :root {
            --bg: #f2efeb;
            --text: #1a1a1a;
            --outline: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg: #0d0d0d;
            --text: #f2efeb;
            --outline: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease;
        }

        /* HERO BACKGROUND TEXT (RESONANCE STYLE) */
        .bg-wrap {
            position: absolute;
            z-index: 1;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        .giant-text {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(8rem, 25vw, 18rem);
            line-height: 0.8;
            opacity: 0.05;
            letter-spacing: -10px;
            text-transform: uppercase;
        }

        .giant-text.outline {
            -webkit-text-stroke: 1.5px var(--text);
            color: transparent;
            opacity: 0.1;
            margin-top: 20px;
        }

        /* CONTENT BLOCK */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 500px;
            padding: 0 30px;
        }

        .error-label {
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--text);
            opacity: 0.5;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h2 {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1;
            margin-bottom: 25px;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.6;
            margin-bottom: 40px;
        }

        /* BUTTONS */
        .btn-row {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 18px 36px;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            text-decoration: none;
            transition: 0.3s ease;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-secondary {
            border: 2px solid var(--text);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--text);
            color: var(--bg);
        }

        /* FOOTER INFO */
        .footer-meta {
            position: absolute;
            bottom: 40px;
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 2px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .btn-row { flex-direction: column; }
            .giant-text { display: none; }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND ARTICULATION -->
    <div class="bg-wrap">
        <h1 class="giant-text">404</h1>
        <h1 class="giant-text outline">NULL</h1>
    </div>

    <!-- MAIN ERROR INTERFACE -->
    <main class="content">
        <p class="error-label">Logic_Terminated // Sync_Error</p>
        <h2>Lost in the lab?</h2>
        <p>The resource you requested has been moved, archived, or deleted from our active nodes. Please return to the core interface.</p>
        
        <div class="btn-row">
            <a href="index.html" class="btn btn-primary">Return to Core</a>
            <a href="zavia.html" class="btn btn-secondary">Ask Zavia</a>
        </div>
    </main>

    <div class="footer-meta">
        HYBOX_OS // ERROR_LOG_S06
    </div>

    <script>
        // Theme Sync (Checks local storage even though disconnected from script.js)
        const savedTheme = localStorage.getItem('hybox-theme');
        if (savedTheme) {
            document.body.setAttribute('data-theme', savedTheme);
        }
    </script>
</body>
</html>

<!DOCTYPE html>

        tailwind.config = {
            darkMode: 'class',

                extend: {
                    colors: {
                        brand: '#7C3AED',
                        success: '#00F59B',
                        warning: '#F97316',
                        darkBg: '#0F172A',
                        darkSurface: '#1E293B',
                        lightBg: '#F1F5F9',
                        lightSurface: '#FFFFFF'

                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']

            }

    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media print { .no-print { display: none !important; } .print-area { display: block !important; } }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

<body class="bg-lightBg dark:bg-darkBg text-slate-900 dark:text-slate-100 h-screen overflow-hidden flex flex-col transition-colors duration-300">

        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">

            </button>
            <div class="flex flex-col">
                <span class="text-brand font-black tracking-tighter text-xl leading-none">HYBOX</span>
                <span class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Ledger Pro v2.0</span>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div id="status-dot" class="flex items-center gap-2 bg-success/10 text-success text-[10px] px-2 py-1 rounded-full border border-success/20">

            <button onclick="toggleTheme()" class="p-2 bg-slate-200 dark:bg-slate-800 rounded-full text-brand">

                <i data-lucide="moon" id="theme-icon-moon" class="w-4 h-4 block dark:hidden"></i>

    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="sidebar-transition w-64 border-r border-slate-200 dark:border-slate-800 bg-lightSurface dark:bg-darkBg flex flex-col no-print">
            <nav class="flex-1 p-3 space-y-1">
                <button onclick="switchTab('pos')" class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-brand/10 hover:text-brand group" id="nav-pos">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                    <span class="nav-text font-semibold">Terminal</span>
                </button>
                <button onclick="switchTab('inventory')" class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-brand/10 hover:text-brand group" id="nav-inventory">
                    <i data-lucide="box" class="w-5 h-5"></i>
                    <span class="nav-text font-semibold">Stock Vault</span>
                </button>
                <button onclick="switchTab('analytics')" class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-brand/10 hover:text-brand group" id="nav-analytics">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                    <span class="nav-text font-semibold">Analytics</span>
                </button>
                <button onclick="switchTab('credit')" class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-brand/10 hover:text-brand group" id="nav-credit">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="nav-text font-semibold">Khata (Credit)</span>
                </button>
            </nav>
            <div class="p-4 border-t border-slate-200 dark:border-slate-800">
                <div class="nav-text p-3 bg-brand/5 rounded-xl border border-brand/10">
                    <p class="text-[10px] uppercase font-bold text-brand">Daily Target</p>
                    <div class="w-full bg-slate-300 dark:bg-slate-700 h-1 rounded-full mt-2">
                        <div class="bg-brand h-full rounded-full" style="width: 65%"></div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto custom-scroll p-4 md:p-8 no-print">
            
            <div id="pos" class="tab-content active h-full">
                <div class="flex flex-col lg:flex-row gap-6 h-full">
                    <div class="flex-1 space-y-4">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                            <input type="text" id="pos-search" onkeyup="searchPOS(this.value)" placeholder="Scan or type item name..." class="w-full bg-lightSurface dark:bg-darkSurface border border-slate-200 dark:border-slate-700 p-4 pl-12 rounded-2xl shadow-sm focus:ring-2 ring-brand outline-none transition-all">
                        </div>
                        <div id="pos-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4"></div>
                    </div>

                    <div class="w-full lg:w-[400px] flex flex-col bg-lightSurface dark:bg-darkSurface rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl overflow-hidden">

                            <h2 class="font-bold flex items-center gap-2"><i data-lucide="receipt" class="w-5 h-5 text-brand"></i> Current Bill</h2>
                            <button onclick="clearCart()" class="text-xs text-red-500 font-bold hover:underline">Clear</button>
                        </div>
                        <div id="cart-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll"></div>
                        <div class="p-6 bg-slate-50 dark:bg-slate-900/50">

                                    <h2 id="total-price" class="text-4xl font-mono font-black text-slate-900 dark:text-white">Rs. 0</h2>
                                </div>
                            </div>
                            <button onclick="checkout()" class="w-full bg-brand text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-brand/30 hover:-translate-y-1 transition-all active:scale-95">COMPLETE SALE</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="inventory" class="tab-content">

    <div id="item-modal" class="fixed inset-0 bg-darkBg/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">

                </div>

                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">Initial Stock</label>

        <p id="p-name" class="text-xs font-bold truncate"></p>
        <img id="p-qr" src="" class="mx-auto w-32 h-32 my-2">
        <p id="p-sku" class="font-mono text-[10px]"></p>
        <p class="text-[8px] mt-2 italic">Optimized for 58mm Thermal</p>
    </div>

    <script>
        // --- DATA STATE ---
        let items = JSON.parse(localStorage.getItem('hybox_items')) || [
            { id: 1, name: "Premium Work Gloves", price: 450, stock: 15, sku: "HB-001" },
            { id: 2, name: "Industrial Drill M1", price: 12500, stock: 4, sku: "HB-002" }
        ];
        let sales = JSON.parse(localStorage.getItem('hybox_v2_sales')) || [];
        let cart = [];
        let isSidebarOpen = true;

        // --- THEME & UI ---
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const texts = document.querySelectorAll('.nav-text');
            isSidebarOpen = !isSidebarOpen;
            sb.style.width = isSidebarOpen ? '256px' : '80px';
            texts.forEach(t => t.style.display = isSidebarOpen ? 'block' : 'none');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('bg-brand/10', 'text-brand'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('bg-brand/10', 'text-brand');
        }

        // --- CORE LOGIC ---
        function renderAll() {
            localStorage.setItem('hybox_items', JSON.stringify(items));
            localStorage.setItem('hybox_v2_sales', JSON.stringify(sales));
            
            // Render POS
            const grid = document.getElementById('pos-grid');
            grid.innerHTML = items.map(i => `
                <div onclick="addToCart(${i.id})" class="bg-lightSurface dark:bg-darkSurface p-5 rounded-2xl border border-slate-200 dark:border-slate-800 hover:border-brand cursor-pointer transition-all group shadow-sm active:scale-95">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-mono text-slate-400 group-hover:text-brand">${i.sku}</span>
                        ${i.stock < 5 ? '<span class="flex h-2 w-2 bg-red-500 rounded-full"></span>' : ''}
                    </div>
                    <h3 class="font-bold truncate text-lg">${i.name}</h3>
                    <div class="flex justify-between items-end mt-4">
                        <span class="font-mono text-xl font-black text-brand">Rs. ${i.price}</span>
                        <span class="text-xs opacity-50">Stock: ${i.stock}</span>
                    </div>
                </div>
            `).join('');

            // Render Inventory
            const table = document.getElementById('inventory-table');
            table.innerHTML = items.map(i => `
                <tr class="border-b border-slate-100 dark:border-slate-800/50 hover:bg-slate-50 dark:hover:bg-slate-800/30">
                    <td class="p-5">
                        <div class="font-bold">${i.name}</div>
                        <div class="text-[10px] font-mono text-slate-400">${i.sku}</div>
                    </td>
                    <td class="p-5 font-mono font-bold text-brand">Rs. ${i.price}</td>
                    <td class="p-5">
                        <div class="w-24 bg-slate-200 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-success h-full" style="width: ${Math.min(i.stock * 2, 100)}%"></div>
                        </div>
                        <span class="text-[10px] font-bold opacity-50 mt-1 block">${i.stock} IN STOCK</span>
                    </td>
                    <td class="p-5 text-right">
                        <button onclick="reprintLabel(${i.id})" class="p-2 hover:text-brand transition-colors"><i data-lucide="printer" class="w-4 h-4"></i></button>
                        <button onclick="deleteItem(${i.id})" class="p-2 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('');
            
            // Stats
            const revenue = sales.reduce((a, b) => a + b.total, 0);
            document.getElementById('stat-revenue').innerText = `Rs. ${revenue.toLocaleString()}`;
            
            lucide.createIcons();
        }

        // --- CART & SALE ---
        function addToCart(id) {
            const item = items.find(i => i.id === id);
            if(item.stock <= 0) return alert("STOCK OUT!");
            cart.push({...item});
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                total += item.price;
                return `
                    <div class="flex justify-between items-center bg-slate-100 dark:bg-slate-800 p-3 rounded-xl animate-in fade-in slide-in-from-right-4">
                        <div class="flex flex-col">
                            <span class="text-xs font-bold truncate w-32">${item.name}</span>
                            <span class="text-[10px] font-mono text-brand">Rs. ${item.price}</span>
                        </div>
                        <button onclick="cart.splice(${idx},1); renderCart()" class="text-red-500 hover:bg-red-500/10 p-2 rounded-lg transition-colors"><i data-lucide="x" class="w-3 h-3"></i></button>
                    </div>
                `;
            }).join('');
            document.getElementById('total-price').innerText = `Rs. ${total.toLocaleString()}`;
            lucide.createIcons();
        }

        function checkout() {
            if(!cart.length) return;
            cart.forEach(c => {
                const i = items.find(item => item.id === c.id);
                if(i) i.stock--;
            });
            sales.push({ id: Date.now(), total: cart.reduce((a,b)=>a+b.price, 0), date: new Date() });
            cart = [];
            renderCart();
            renderAll();
            alert("SUCCESS: TRANSACTION COMPLETE");
        }

        // --- LABEL REPRINT ENGINE ---
        function reprintLabel(id) {
            const item = items.find(i => i.id === id);
            document.getElementById('p-name').innerText = item.name.toUpperCase();
            document.getElementById('p-sku').innerText = item.sku;
            document.getElementById('p-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${item.sku}&bgcolor=ffffff`;
            setTimeout(() => window.print(), 500);
        }

        // --- CRUD HELPERS ---
        function openModal() { document.getElementById('item-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('item-modal').classList.add('hidden'); }
        function saveItem() {
            const name = document.getElementById('in-name').value;
            const price = parseInt(document.getElementById('in-price').value);
            const stock = parseInt(document.getElementById('in-stock').value);
            if(!name || !price) return;
            items.push({ id: Date.now(), name, price, stock, sku: 'HB-' + Math.floor(Math.random()*9000+1000) });
            renderAll();
            closeModal();
        }
        function deleteItem(id) { items = items.filter(i => i.id !== id); renderAll(); }
        function searchPOS(v) { /* Logic similar to renderAll filter */ }

        // --- INIT ---
        window.onload = () => {
            renderAll();
            switchTab('pos');
        }
